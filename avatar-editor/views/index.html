<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Редактор точек</title><link rel="stylesheet" href="/avatar-editor/css/editor.css"></head><body><main><header><h1>Опорные точки</h1><span id="status">Подключение…</span></header><section id="animals"><input id="search" placeholder="Найти кошку"><div id="animalList"></div></section><section id="media" hidden><button class="back">← К кошкам</button><h2 id="animalName"></h2><div id="mediaList"></div></section><section id="editor" hidden><button class="back">← К фото</button><div id="stage"><img id="photo" alt=""><div id="anchors"></div><img id="preview" alt="preview"></div><div class="controls"><label>Точка <select id="point"><option value="head">head</option><option value="back">back</option><option value="left_paw">left_paw</option><option value="right_paw">right_paw</option></select></label><label>x <input id="x" type="number" step=".001" min="0" max="1"></label><label>y <input id="y" type="number" step=".001" min="0" max="1"></label><label>angle <input id="angle" type="number" step="1" min="-360" max="360"></label><label>Тема <select id="theme"><option value="crown">crown</option><option value="wings">wings</option><option value="scepter">scepter</option></select></label><label>scale <input id="scale" type="range" min=".2" max="2" step=".1" value="1"></label><label>rotate <input id="rotate" type="range" min="-180" max="180" value="0"></label><button id="save">Сохранить</button></div></section></main><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="/avatar-editor/js/editor.js"></script></body></html>
