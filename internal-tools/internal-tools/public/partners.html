<!doctype html><html lang="ru"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><main><h1>Редактор партнёров</h1><p id="status">Загрузка…</p><div id="list"></div><a href="/tools">Назад</a></main><script>fetch("/api/tools/partners",{credentials:"same-origin"}).then(r=>r.json()).then(x=>{document.querySelector("#status").textContent="";for(const p of x.data||[]){const e=document.createElement("article");e.textContent=(p.name||p.slug)+" — "+(p.url||"");document.querySelector("#list").append(e)}}).catch(()=>document.querySelector("#status").textContent="Не удалось загрузить список.")</script>
